services:
  - type: web
    name: smart-tourism-backend
    env: python
    rootDir: Backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: REQUIRE_HTTPS
        value: "false"
